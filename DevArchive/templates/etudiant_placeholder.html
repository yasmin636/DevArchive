{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page_title }} — SIGAUD</title>
  {% include 'includes/sigaud_theme_head.html' %}
  <link rel="stylesheet" href="{% static 'css/etudiant.css' %}">
</head>
<body class="etudiant-layout">
<nav class="top-nav">
  <a href="{% url 'espace_etudiant' %}" class="brand">
    <div class="brand-logo-wrap">
      <img src="{% static 'img/logo_site.png' %}" alt="SIGAUD" class="brand-logo">
    </div>
    <div class="brand-text">
      <span class="brand-name">SIGAUD</span>
      <span class="brand-sub">Système Intégré de Gestion des Archives de l'Université de Djibouti</span>
    </div>
  </a>
  <div class="user-area">
    <button type="button" class="theme-toggle-btn me-1 me-md-2" data-theme-toggle title="Thème clair ou sombre" aria-pressed="false">
      <i class="bi bi-moon-stars-fill" aria-hidden="true"></i>
      <span class="theme-toggle-label d-none d-lg-inline">Sombre</span>
    </button>
    <a href="{% url 'espace_etudiant' %}" class="btn btn-outline-primary btn-sm">Retour au tableau de bord</a>
  </div>
</nav>
<main class="main-content">
  <div class="welcome-banner">
    <h2>{{ page_title }}</h2>
    <p class="mb-0 opacity-90">Cette page sera bientôt disponible.</p>
  </div>
  <a href="{% url 'espace_etudiant' %}" class="btn btn-primary"><i class="bi bi-arrow-left me-2"></i>Retour à l'accueil</a>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
