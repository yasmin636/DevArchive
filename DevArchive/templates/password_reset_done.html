{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Email envoyé — SIGAUD</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/inscription.css' %}">
</head>
<body>
<div class="register-wrapper">
  <div class="register-card">
    <div class="register-header">
      <img src="{% static 'img/en_haut_formulaire_inscription.jpg' %}" alt="" class="register-top-image">
      <h1 class="register-title">Vérifiez votre boîte mail</h1>
      <div class="register-divider"></div>
    </div>
    <div class="register-body">
      <p>Si un compte existe avec cette adresse, un email contenant un lien de réinitialisation vient de vous être envoyé.</p>
      <p>Vérifiez également votre dossier <strong>courriers indésirables</strong>.</p>
      <div class="d-grid mt-3">
        <a href="{% url 'connexion' %}" class="btn btn-primary btn-lg rounded-4">Retour à la connexion</a>
      </div>
    </div>
  </div>
</div>
</body>
</html>
