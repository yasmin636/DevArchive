{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mot de passe réinitialisé — DevArchive</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/bootstrap_sigaud_theme.css' %}">
  <link rel="stylesheet" href="{% static 'css/theme_modes.css' %}">
  <link rel="stylesheet" href="{% static 'css/inscription.css' %}">
</head>
<body>
<div class="register-wrapper">
  <div class="register-card">
    <div class="register-header">
      <img src="{% static 'img/en_haut_formulaire_inscription.jpg' %}" alt="" class="register-top-image">
      <h1 class="register-title">Mot de passe réinitialisé</h1>
      <div class="register-divider"></div>
    </div>
    <div class="register-body">
      <p>Votre mot de passe a bien été mis à jour. Vous pouvez maintenant vous connecter avec votre nouveau mot de passe.</p>
      <div class="d-grid mt-3">
        <a href="{% url 'connexion' %}" class="btn btn-primary btn-lg rounded-4">Aller à la connexion</a>
      </div>
    </div>
  </div>
</div>
<script src="{% static 'js/theme_modes.js' %}"></script>
</body>
</html>
