<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion — SIGAUD (maquette)</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    :root {
      --clr-primary: #0d6efd;
      --clr-text: #212529;
      --clr-muted: #6c757d;
      --clr-border: #dee2e6;
      --radius-card: 1.25rem;
      --radius-input: 0.6rem;
      --shadow-card: 0 20px 40px rgba(0, 0, 0, 0.12);
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      background-size: cover;
      background-position: center;
    }
    .login-wrapper { width: 100%; max-width: 560px; }
    .login-card {
      background: #fff;
      border-radius: var(--radius-card);
      box-shadow: var(--shadow-card);
      overflow: hidden;
    }
    .login-header { text-align: center; padding: 2rem 2rem 1.25rem; }
    .login-logo { display: block; width: 160px; height: auto; margin: 0 auto 1rem; object-fit: contain; }
    .login-title { font-weight: 700; font-size: 1.5rem; color: var(--clr-text); margin: 0 0 0.3rem; }
    .login-subtitle { color: var(--clr-muted); font-size: 0.95rem; margin: 0; }
    .login-divider { width: 60px; height: 3px; background: var(--clr-primary); border-radius: 999px; margin: 1rem auto 0; }
    .login-body { padding: 1.5rem 2.5rem 1.75rem; }
    .login-body .form-label { font-size: 0.9rem; margin-bottom: 0.2rem; color: var(--clr-text); }
    .login-body .form-control { border-radius: var(--radius-input); padding: 0.6rem 0.9rem; font-size: 0.9rem; border-color: var(--clr-border); }
    .pw-wrapper { position: relative; }
    .pw-wrapper .form-control { padding-right: 2.8rem; }
    .toggle-pw { position: absolute; right: 0.75rem; top: 50%; transform: translateY(-50%); background: none; border: none; color: #aab0c0; cursor: pointer; padding: 0; font-size: 1rem; }
    .options-row { display: flex; align-items: center; justify-content: space-between; margin: 0.75rem 0 1.5rem; }
    .forgot-link { font-size: 0.875rem; font-weight: 600; color: var(--clr-primary); text-decoration: none; }
    .btn-connexion { font-size: 1rem; font-weight: 600; padding: 0.75rem; border-radius: 0.5rem; }
    .login-footer { text-align: center; font-size: 0.9rem; color: var(--clr-muted); padding: 0 2.5rem 1.5rem; }
    .login-footer a { color: var(--clr-primary); font-weight: 600; text-decoration: none; }
    .login-footer small { display: block; margin-top: 1.25rem; font-size: 0.8rem; }
    @media (max-width: 576px) {
      .login-body, .login-header, .login-footer { padding-left: 1.25rem; padding-right: 1.25rem; }
      .login-logo { width: 130px; }
    }
  </style>
</head>
<body>
  <div class="login-wrapper">
    <div class="login-card">
      <div class="login-header">
        <div class="login-logo bg-light rounded p-3 text-center text-primary"><i class="bi bi-archive-fill" style="font-size:3rem;"></i></div>
        <h1 class="login-title">Connexion</h1>
        <p class="login-subtitle">Connectez-vous à votre espace SIGAUD</p>
        <div class="login-divider"></div>
      </div>
      <div class="login-body">
        <div class="alert alert-danger d-none" id="loginAlert" role="alert">
          <i class="bi bi-exclamation-triangle-fill me-2"></i>
          <span id="loginAlertMsg">Email ou mot de passe incorrect.</span>
        </div>
        <form action="#" method="get" id="loginForm" novalidate>
          <input type="hidden" name="next" value="">
          <div class="mb-3">
            <label class="form-label" for="id_username">Adresse électronique</label>
            <input type="email" class="form-control" id="id_username" name="username" placeholder="nom@gmail.com" autocomplete="email" value="" required>
          </div>
          <div class="mb-1">
            <label class="form-label" for="id_password">Mot de passe</label>
            <div class="pw-wrapper">
              <input type="password" class="form-control" id="id_password" name="password" placeholder="••••••••" autocomplete="current-password" required>
              <button type="button" class="toggle-pw" id="togglePw" aria-label="Afficher / Masquer le mot de passe">
                <i class="bi bi-eye" id="eyeIcon"></i>
              </button>
            </div>
          </div>
          <div class="options-row">
            <div class="form-check">
              <input class="form-check-input" type="checkbox" name="remember_me" id="rememberMe">
              <label class="form-check-label" for="rememberMe">Se souvenir de moi</label>
            </div>
            <a href="#" class="forgot-link">Mot de passe oublié ?</a>
          </div>
          <div class="d-grid">
            <button type="submit" class="btn btn-primary btn-connexion">Se connecter</button>
          </div>
        </form>
      </div>
      <div class="login-footer">
        <div>
          Pas encore de compte ?
          <a href="inscription.html">S'inscrire</a>
        </div>
        <div class="mt-2">
          <a href="etudiant.html" class="text-muted" style="font-size:0.8rem;">Voir l'espace étudiant</a>
          <span class="text-muted mx-1">·</span>
          <a href="administrateur.html" class="text-muted" style="font-size:0.8rem;">Voir l'espace admin</a>
        </div>
        <small>© 2026 SIGAUD · Université de Djibouti</small>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
  (function() {
    var togglePw = document.getElementById('togglePw');
    var inputPw = document.getElementById('id_password');
    var eyeIcon = document.getElementById('eyeIcon');
    if (togglePw && inputPw && eyeIcon) {
      togglePw.addEventListener('click', function() {
        var isPassword = inputPw.type === 'password';
        inputPw.type = isPassword ? 'text' : 'password';
        eyeIcon.classList.toggle('bi-eye', !isPassword);
        eyeIcon.classList.toggle('bi-eye-slash', isPassword);
      });
    }
    var form = document.getElementById('loginForm');
    if (form) form.addEventListener('submit', function(e) { e.preventDefault(); alert('Maquette : pas d\'envoi.'); });
  })();
  </script>
</body>
</html>
