{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mot de passe oublié — DevArchive</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/bootstrap_sigaud_theme.css' %}">
  <link rel="stylesheet" href="{% static 'css/theme_modes.css' %}">
  <link rel="stylesheet" href="{% static 'css/inscription.css' %}">
</head>
<body>
<div class="register-wrapper">
  <div class="register-card">
    <div class="register-header">
      <img src="{% static 'img/en_haut_formulaire_inscription.jpg' %}" alt="" class="register-top-image">
      <h1 class="register-title">Mot de passe oublié</h1>
      <p class="register-subtitle">Entrez votre adresse email pour recevoir un lien de réinitialisation.</p>
      <div class="register-divider"></div>
    </div>
    <div class="register-body">
      <form method="post">
        {% csrf_token %}
        {% if form.email.errors %}
          <div class="alert alert-danger">
            {% for error in form.email.errors %}{{ error }}{% endfor %}
          </div>
        {% endif %}
        <div class="mb-3">
          <label class="form-label" for="{{ form.email.id_for_label }}">Adresse email</label>
          {{ form.email }}
        </div>
        <div class="d-grid mt-3">
          <button type="submit" class="btn btn-primary btn-lg rounded-4">Envoyer le lien</button>
        </div>
      </form>
    </div>
    <div class="register-footer">
      <div>
        <a href="{% url 'connexion' %}">Retour à la connexion</a>
      </div>
    </div>
  </div>
</div>
<script src="{% static 'js/theme_modes.js' %}"></script>
</body>
</html>
