<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Inscription - SIGAUD (maquette)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    body {
      min-height: 100vh;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      background-size: cover;
      background-position: center;
    }
    .register-wrapper { width: 100%; max-width: 900px; padding: 2rem 1rem; }
    .register-card {
      border-radius: 1.25rem;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
      background-color: #ffffff;
    }
    .register-header { text-align: center; padding: 2rem 2rem 1rem; }
    .register-top-image { display: block; max-width: 100%; height: auto; margin: 0 auto 1rem; }
    .register-title { font-weight: 600; font-size: 1.5rem; margin-bottom: 0.25rem; }
    .register-subtitle { color: #6c757d; font-size: 0.95rem; }
    .register-divider { width: 60px; height: 3px; background-color: #0d6efd; border-radius: 999px; margin: 1rem auto 0; }
    .register-body { padding: 1rem 2.5rem 2rem; }
    .form-label { font-size: 0.9rem; margin-bottom: 0.15rem; }
    .form-control, .form-select { border-radius: 0.6rem; padding: 0.55rem 0.9rem; font-size: 0.9rem; }
    .register-footer { text-align: center; font-size: 0.9rem; padding: 0 2.5rem 1.25rem; color: #6c757d; }
    .register-footer small { display: block; margin-top: 1.25rem; font-size: 0.8rem; }
    @media (max-width: 576px) {
      .register-body, .register-header, .register-footer { padding-left: 1.25rem; padding-right: 1.25rem; }
    }
  </style>
</head>
<body>
  <div class="register-wrapper">
    <div class="register-card">
      <div class="register-header">
        <div class="register-top-image bg-light rounded p-3 text-center text-primary mx-auto" style="max-width:200px;"><i class="bi bi-archive-fill" style="font-size:2.5rem;"></i></div>
        <h1 class="register-title">SIGAUD</h1>
        <p class="register-subtitle">Portail d'archivage des projets étudiants</p>
        <div class="register-divider"></div>
      </div>
      <div class="register-body">
        <form action="#" method="get" novalidate id="inscriptionForm">
          <div class="mb-3">
            <label class="form-label" for="id_full_name">Nom complet</label>
            <input type="text" class="form-control" id="id_full_name" name="full_name" placeholder="Ex: Ahmed Abdourahman">
          </div>
          <div class="mb-3">
            <label class="form-label" for="id_email">Email universitaire</label>
            <input type="email" class="form-control" id="id_email" name="email" placeholder="prenom.nom@gmail.com">
          </div>
          <div class="row g-3">
            <div class="col-md-12">
              <label class="form-label" for="id_faculte">Faculté</label>
              <select name="faculte" id="id_faculte" class="form-select">
                <option value="">— Choisir —</option>
                <option value="1" data-faculte-id="1">Sciences</option>
                <option value="2" data-faculte-id="2">Ingénierie</option>
                <option value="3" data-faculte-id="3">Droit</option>
              </select>
            </div>
            <div class="col-md-6">
              <label class="form-label" for="id_filiere">Filière</label>
              <select name="filiere" id="id_filiere" class="form-select" disabled>
                <option value="">Choisir d'abord la faculté</option>
                <option value="1" data-faculte-id="1">Licence Informatique</option>
                <option value="2" data-faculte-id="1">Licence Mathématiques</option>
                <option value="3" data-faculte-id="2">Génie Civil</option>
                <option value="4" data-faculte-id="2">Génie Électrique</option>
              </select>
            </div>
            <div class="col-md-6">
              <label class="form-label" for="id_niveau">Niveau</label>
              <select name="niveau" id="id_niveau" class="form-select" disabled>
                <option value="">Choisir d'abord la faculté</option>
                <option value="1" data-faculte-id="1">L1</option>
                <option value="2" data-faculte-id="1">L2</option>
                <option value="3" data-faculte-id="1">L3</option>
                <option value="4" data-faculte-id="2">M1</option>
                <option value="5" data-faculte-id="2">M2</option>
              </select>
            </div>
          </div>
          <div class="row g-3 mt-1">
            <div class="col-md-6">
              <label class="form-label" for="id_password1">Mot de passe</label>
              <input type="password" class="form-control" id="id_password1" name="password1" placeholder="••••••••">
            </div>
            <div class="col-md-6">
              <label class="form-label" for="id_password2">Confirmer le mot de passe</label>
              <input type="password" class="form-control" id="id_password2" name="password2" placeholder="••••••••">
            </div>
          </div>
          <div class="d-grid mt-4">
            <button type="submit" class="btn btn-primary btn-lg rounded-4">S'inscrire</button>
          </div>
        </form>
      </div>
      <div class="register-footer">
        <div>
          Déjà un compte ?
          <a href="connexion.html" class="text-primary text-decoration-none">Se connecter</a>
        </div>
        <div class="mt-2">
          <a href="etudiant.html" class="text-muted" style="font-size:0.8rem;">Voir l'espace étudiant (maquette)</a>
        </div>
        <small>© 2024 Université de Djibouti · Faculté d'Ingénierie</small>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
  (function() {
    var faculteSelect = document.getElementById('id_faculte');
    var filiereSelect = document.getElementById('id_filiere');
    var niveauSelect = document.getElementById('id_niveau');
    function setFirstOption(select, text) {
      var first = select.options[0];
      if (first) { first.textContent = text; first.value = ''; }
    }
    function filterByFaculte() {
      var faculteId = faculteSelect.value;
      setFirstOption(filiereSelect, faculteId ? 'Choisir…' : 'Choisir d\'abord la faculté');
      setFirstOption(niveauSelect, faculteId ? 'Choisir…' : 'Choisir d\'abord la faculté');
      [filiereSelect, niveauSelect].forEach(function(select) {
        for (var i = 1; i < select.options.length; i++) {
          var opt = select.options[i];
          var match = opt.getAttribute('data-faculte-id') === faculteId;
          opt.style.display = match ? '' : 'none';
        }
        select.disabled = !faculteId;
        if (!faculteId) select.value = '';
      });
    }
    faculteSelect.addEventListener('change', filterByFaculte);
    filterByFaculte();
    document.getElementById('inscriptionForm').addEventListener('submit', function(e) { e.preventDefault(); alert('Maquette : pas d\'envoi.'); });
  })();
  </script>
</body>
</html>
