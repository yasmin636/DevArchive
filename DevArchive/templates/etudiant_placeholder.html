{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page_title }} — SIGAUD</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/bootstrap_sigaud_theme.css' %}">
  <link rel="stylesheet" href="{% static 'css/theme_modes.css' %}">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="{% static 'css/etudiant.css' %}">
</head>
<body>
<nav class="top-nav">
  <a href="{% url 'espace_etudiant' %}" class="brand">
    <div class="brand-logo-wrap">
      <img src="{% static 'img/logo_site.png' %}" alt="SIGAUD" class="brand-logo">
    </div>
    <div class="brand-text">
      <span class="brand-name">SIGAUD</span>
      <span class="brand-sub">Système Intégré de Gestion des Archives de l'Université de Djibouti</span>
    </div>
  </a>
  <div class="user-area">
    <a href="{% url 'espace_etudiant' %}" class="btn btn-outline-primary btn-sm">Retour au tableau de bord</a>
  </div>
</nav>
<main class="main-content">
  <div class="welcome-banner">
    <h2>{{ page_title }}</h2>
    <p class="mb-0 opacity-90">Cette page sera bientôt disponible.</p>
  </div>
  <a href="{% url 'espace_etudiant' %}" class="btn btn-primary"><i class="bi bi-arrow-left me-2"></i>Retour à l'accueil</a>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="{% static 'js/theme_modes.js' %}"></script>
</body>
</html>
